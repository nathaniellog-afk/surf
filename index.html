<style>
/* ============================================
   TEMA — dark (padrão) e light
   ============================================ */
:root, [data-theme="dark"]{
  --bg:          #06101F;
  --bg-2:        #0B1B33;
  --surface:     rgba(255,255,255,0.035);
  --surface-2:   rgba(255,255,255,0.06);
  --surface-hi:  rgba(255,255,255,0.09);
  --border:      rgba(255,255,255,0.08);
  --border-hi:   rgba(255,255,255,0.16);
  --text:        #EAF4F2;
  --text-dim:    rgba(234,244,242,0.62);
  --text-mute:   rgba(234,244,242,0.38);
  --text-faint:  rgba(234,244,242,0.22);
  --accent:      #3DD9B0;
  --accent-2:    #7FF0CE;
  --accent-soft: rgba(61,217,176,0.14);
  --info:        #5BA9FF;
  --warn:        #FFB547;
  --danger:      #FF6B6B;
  --header-grad: linear-gradient(135deg,#062944 0%,#0A3B63 55%,#0D4F7A 100%);
  --card-grad:   linear-gradient(135deg,rgba(11,39,70,0.9),rgba(14,56,96,0.85));
  --chart-grid:  rgba(255,255,255,0.05);
  --chart-tick:  rgba(255,255,255,0.42);
  --tooltip-bg:  #0B1B33;
  --shadow:      0 10px 30px -12px rgba(0,0,0,0.55), 0 2px 6px -2px rgba(0,0,0,0.4);
}
[data-theme="light"]{
  --bg:          #F4F8FB;
  --bg-2:        #E8EFF5;
  --surface:     rgba(255,255,255,0.85);
  --surface-2:   rgba(255,255,255,0.95);
  --surface-hi:  #ffffff;
  --border:      rgba(10,40,80,0.09);
  --border-hi:   rgba(10,40,80,0.18);
  --text:        #0A2844;
  --text-dim:    rgba(10,40,68,0.68);
  --text-mute:   rgba(10,40,68,0.48);
  --text-faint:  rgba(10,40,68,0.28);
  --accent:      #0F9E7A;
  --accent-2:    #1BC198;
  --accent-soft: rgba(15,158,122,0.12);
  --info:        #2272D9;
  --warn:        #C97A12;
  --danger:      #D33;
  --header-grad: linear-gradient(135deg,#1E74B8 0%,#2C97D9 55%,#5BBAEB 100%);
  --card-grad:   linear-gradient(135deg,#ffffff,#f0f6fb);
  --chart-grid:  rgba(10,40,80,0.06);
  --chart-tick:  rgba(10,40,68,0.55);
  --tooltip-bg:  #ffffff;
  --shadow:      0 8px 24px -8px rgba(20,60,100,0.18), 0 2px 4px -1px rgba(20,60,100,0.08);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%,var(--bg-2),transparent 60%),var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"cv11","ss01","ss03";
  transition:background-color .3s ease;
}

/* ============================================
   HEADER
   ============================================ */
.header{
  background:var(--header-grad);
  padding:16px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
  overflow:hidden;
  min-height:72px;
  border-bottom:1px solid var(--border);
}
.logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1;}
.logo span{color:var(--accent-2);font-weight:600;}
.header-sub{font-size:11px;color:rgba(255,255,255,.72);margin-top:4px;font-weight:500;letter-spacing:.01em;}

.icon-btn{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);
  border-radius:10px;
  width:36px;height:36px;
  cursor:pointer;
  color:#fff;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.icon-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3);transform:translateY(-1px);}
.icon-btn:active{transform:translateY(0);}

/* ============================================
   BARRA DE PICOS
   ============================================ */
.spot-bar{
  background:var(--bg);
  padding:12px 24px;
  display:flex;
  gap:8px;
  overflow-x:auto;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.spot-bar::-webkit-scrollbar{display:none;}
.spot-btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-dim);
  padding:9px 18px;
  border-radius:999px;
  font-size:12px;font-weight:600;
  letter-spacing:.02em;
  cursor:pointer;
  white-space:nowrap;
  transition:all .2s ease;
  font-family:inherit;
}
.spot-btn:hover{background:var(--surface-2);border-color:var(--border-hi);color:var(--text);}
.spot-btn.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  box-shadow:0 4px 12px -2px var(--accent-soft),0 0 0 3px var(--accent-soft);
}
[data-theme="light"] .spot-btn.active{color:#fff;}

/* ============================================
   LAYOUT
   ============================================ */
.main{padding:20px 24px;max-width:1100px;margin:0 auto;}
.sec{margin-bottom:22px;}
.sec-title{
  font-size:11px;
  font-weight:600;
  color:var(--text-mute);
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:.1em;
}

/* ============================================
   CARD DE CONDIÇÕES ATUAIS
   ============================================ */
.current-card{
  background:var(--card-grad);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px 22px;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:space-between;
  min-width:0;flex:1;gap:20px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
[data-theme="dark"] .current-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(400px 200px at 0% 0%,var(--accent-soft),transparent 50%);
  pointer-events:none;
}

/* ============================================
   ASTRO (sol/lua)
   ============================================ */
.astro-sun,.astro-moon{transition:opacity .4s ease;}
[data-theme="dark"] .astro-sun{display:none;}
[data-theme="light"] .astro-moon{display:none;}

/* ============================================
   BOTÃO EXPANDIR GRÁFICO
   ============================================ */
.expand-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:32px;height:32px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text-dim);
  cursor:pointer;
  transition:all .2s ease;
  flex-shrink:0;
}
.expand-btn:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}

/* ============================================
   MODAL FULLSCREEN DO GRÁFICO
   ============================================ */
.chart-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  z-index:1000;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:16px;
  align-items:center;
  justify-content:center;
}
.chart-modal.open{display:flex;}
.chart-modal-inner{
  background:var(--bg-2);
  border:1px solid var(--border);
  border-radius:16px;
  width:100%;
  max-width:1400px;
  max-height:calc(100vh - 32px);
  display:flex;
  flex-direction:column;
  box-shadow:0 24px 60px -12px rgba(0,0,0,.6);
  overflow:hidden;
}
.chart-modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.chart-modal-title{
  font-size:14px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-.01em;
}
.chart-modal-header .icon-btn{
  width:32px;height:32px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text-dim);
  font-size:16px;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
}
.chart-modal-header .icon-btn:hover{background:var(--surface-hi);color:var(--text);}
.chart-modal-body{
  flex:1;
  min-height:0;
  padding:18px;
  overflow:hidden;
  position:relative;
}
.chart-modal-body canvas{
  width:100% !important;
  height:100% !important;
  max-height:100%;
}
.chart-modal-legend{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
  justify-content:center;
  padding:12px 18px;
  border-top:1px solid var(--border);
  font-size:11px;
  color:var(--text-dim);
  flex-shrink:0;
}
.chart-modal-legend>div{display:flex;align-items:center;gap:6px;}

/* Em modo landscape no mobile, usa o espaço inteiro */
@media(max-width:900px){
  .chart-modal{padding:8px;}
  .chart-modal-inner{max-height:calc(100vh - 16px);border-radius:12px;}
  .chart-modal-header{padding:10px 14px;}
  .chart-modal-body{padding:12px;}
  .chart-modal-legend{gap:10px;padding:8px 14px;font-size:10px;}
}

/* ============================================
   BOTÃO SHARE
   ============================================ */
.share-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:36px;height:36px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  border-radius:10px;
  color:rgba(255,255,255,.85);
  cursor:pointer;
  transition:all .2s ease;
  margin-left:12px;
  flex-shrink:0;
  align-self:center;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.share-btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);color:#fff;transform:translateY(-1px);}
.share-btn:active{transform:translateY(0);}
.share-btn:disabled{opacity:.5;cursor:wait;}
[data-theme="light"] .share-btn{
  background:rgba(255,255,255,.25);
  border-color:rgba(255,255,255,.45);
  color:#fff;
}
[data-theme="light"] .share-btn:hover{background:rgba(255,255,255,.4);border-color:rgba(255,255,255,.6);}

/* Variante inline (embaixo do diagnóstico do vento) - em pill com texto */
.share-btn.share-btn-inline{
  width:auto;
  height:auto;
  padding:5px 12px;
  margin-left:0;
  margin-top:6px;
  gap:6px;
  border-radius:999px;
  font-family:inherit;
  font-size:11px;
  font-weight:600;
  letter-spacing:.01em;
  align-self:flex-start;
  white-space:nowrap;
}
.share-btn.share-btn-inline svg{flex-shrink:0;}

/* ============================================
   BOTÃO ROTA
   ============================================ */
.route-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--accent-soft);
  border:1px solid var(--accent);
  color:var(--accent);
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  font-family:inherit;
  transition:all .2s ease;
  white-space:nowrap;
  flex-shrink:0;
  letter-spacing:.02em;
}
.route-btn:hover{
  background:var(--accent);
  color:#fff;
  transform:translateY(-1px);
  box-shadow:0 4px 10px -2px var(--accent-soft);
}
.route-btn:active{transform:translateY(0);}
.route-btn svg{flex-shrink:0;}

/* ============================================
   BADGES E RATINGS
   ============================================ */
.rating-badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  gap:4px;
  letter-spacing:.01em;
}
.rating-great{background:var(--accent);color:#fff;}
.rating-good{background:var(--info);color:#fff;}
.rating-fair{background:var(--warn);color:#fff;}
.rating-poor{background:var(--surface-2);color:var(--text-dim);}

/* ============================================
   STATS
   ============================================ */
.stat{text-align:center;padding:0 16px;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-val{font-size:22px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-.02em;}
.stat-unit{font-size:10px;color:var(--text-mute);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;}
.stat-lbl{font-size:10px;color:var(--text-mute);margin-top:3px;font-weight:500;}

/* ============================================
   GRID 7 DIAS
   ============================================ */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:8px 4px;
  text-align:center;
  cursor:pointer;
  transition:all .2s ease;
}
.day-card:hover{
  border-color:var(--border-hi);
  background:var(--surface-2);
  transform:translateY(-1px);
}
.day-card.active{
  border-color:var(--accent);
  background:var(--accent-soft);
  box-shadow:0 0 0 1px var(--accent-soft);
}
.day-name{font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:2px;letter-spacing:.02em;}
.day-icon{font-size:13px;margin:2px 0;}
.day-wave{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:-.02em;}

/* ============================================
   CHART
   ============================================ */
.chart-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;}
.chart-tab{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text-dim);
  padding:6px 14px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  font-family:inherit;
}
.chart-tab:hover{color:var(--text);border-color:var(--border-hi);}
.chart-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ============================================
   HORAS (mantido por compat)
   ============================================ */
.hour-table{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  max-height:480px;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border-hi) transparent;
}
.hour-head{
  display:grid;
  grid-template-columns:56px 1fr 1fr 1fr 1fr 1fr;
  padding:10px 16px;
  background:var(--surface-2);
  font-size:10px;
  color:var(--text-mute);
  text-transform:uppercase;
  letter-spacing:.07em;
  gap:8px;
  position:sticky;top:0;z-index:1;
  font-weight:600;
}
.hour-row{
  display:grid;
  grid-template-columns:56px 1fr 1fr 1fr 1fr 1fr;
  padding:9px 16px;
  border-top:1px solid var(--border);
  font-size:12px;
  gap:8px;
  align-items:center;
  transition:background .15s;
}
.hour-row:hover{background:var(--surface-2);}
.hour-row.now{background:var(--accent-soft);border-top-color:var(--accent);}
.h-time{color:var(--text-dim);font-weight:600;}
.h-wave{color:var(--accent);font-weight:700;}
.h-period{color:var(--info);}
.h-wind{color:var(--warn);}
.h-dir{color:var(--text-mute);}
.h-rain{color:var(--info);}
.hour-row.score-great{border-left:2px solid var(--accent);}
.hour-row.score-good{border-left:2px solid var(--info);}

/* ============================================
   MELHORES SESSÕES
   ============================================ */
.best-table{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  width:100%;
  box-shadow:var(--shadow);
}
.best-head{
  display:grid;
  grid-template-columns:92px 50px 78px 60px 70px 44px 75px 100px 1fr;
  padding:8px 16px;
  background:var(--surface-2);
  font-size:10px;
  color:var(--text-mute);
  text-transform:uppercase;
  letter-spacing:.08em;
  gap:12px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}
.best-row{
  display:grid;
  grid-template-columns:92px 50px 78px 60px 70px 44px 75px 100px 1fr;
  padding:5px 16px;
  border-top:1px solid var(--border);
  font-size:12.5px;
  gap:12px;
  align-items:center;
  transition:all .15s;
}
.best-row:hover{background:var(--accent-soft);}
.best-active{background:var(--accent-soft) !important;border-left:3px solid var(--accent);padding-left:13px;}
.best-top{border-left:3px solid var(--accent-2);padding-left:13px;}
.best-day{color:var(--text);font-weight:600;font-size:13px;}
.best-date{color:var(--text-faint);font-size:10px;font-weight:400;margin-left:4px;}
.best-hour{color:var(--accent);font-weight:700;font-size:11.5px;}
.best-wave{color:var(--accent);font-weight:700;font-size:11.5px;}
.best-per{color:var(--text-dim);}
.best-wind{color:var(--text-dim);}
.best-wdir{color:var(--text-mute);}
.best-tide{color:var(--text-dim);}
.best-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 11px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

/* ============================================
   WIND BADGES
   ============================================ */
.wind-badge{margin-left:0;}
.wind-off{background:rgba(61,217,176,.15);color:var(--accent);}
.wind-on{background:rgba(255,107,107,.15);color:var(--danger);}
.wind-cross{background:rgba(255,181,71,.15);color:var(--warn);}

/* Badge compacto de diagnóstico na tabela */
.wind-diag{
  display:inline-flex;
  align-items:center;
  padding:3px 9px;
  border-radius:999px;
  font-size:10px;
  font-weight:600;
  letter-spacing:.01em;
  white-space:nowrap;
}
.wind-diag.wind-off{background:rgba(61,217,176,.18);color:var(--accent);border:1px solid rgba(61,217,176,.35);}
.wind-diag.wind-on{background:rgba(255,107,107,.18);color:var(--danger);border:1px solid rgba(255,107,107,.35);}
.wind-diag.wind-cross{background:rgba(255,181,71,.18);color:var(--warn);border:1px solid rgba(255,181,71,.35);}

/* ============================================
   MISC
   ============================================ */
.update-badge{font-size:10px;color:var(--text-faint);margin-left:8px;font-weight:400;}
.spinner{
  width:32px;height:32px;
  border:3px solid var(--accent-soft);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.error-msg{
  background:rgba(255,107,107,.1);
  border:1px solid rgba(255,107,107,.25);
  border-radius:14px;
  padding:16px;text-align:center;
  color:var(--danger);
}
.loading{padding:48px 16px;text-align:center;color:var(--text-dim);}

/* ============================================
   RESPONSIVO
   ============================================ */
@media(max-width:700px){
  .main{padding:14px;}
  .days-grid{grid-template-columns:repeat(4,1fr);}
  .hour-head,.hour-row{grid-template-columns:50px 1fr 1fr 1fr;}
  .h-period{display:none;}
  /* Tabela melhores: mostra TODAS as colunas + Diag */
  .best-head,.best-row{grid-template-columns:72px 34px 66px 42px 44px 32px 52px 72px;padding-left:8px;padding-right:8px;gap:4px;font-size:11px;}
  .best-active,.best-top{padding-left:5px;}
  .h-rain{display:none;}
  /* Esconder apenas o divider vazio (9º) */
  .best-head>div:nth-child(9){display:none;}
  .best-badge{padding:3px 7px;font-size:9.5px;}
  .best-hour,.best-wave{font-size:10.5px;}
  .wind-diag{padding:2px 6px;font-size:9px;}
  .current-card{flex-direction:column;align-items:flex-start;}
  .header{padding:14px 18px;min-height:64px;}
  .logo{font-size:20px;}
}
@media(max-width:430px){
  /* Telas muito estreitas: compacta mais mas mantém todas as colunas */
  .best-head,.best-row{grid-template-columns:66px 30px 60px 36px 40px 28px 46px 60px;font-size:10px;gap:3px;padding-left:6px;padding-right:6px;}

  .best-day{font-size:11px;}
  .best-head{font-size:8.5px;letter-spacing:.04em;}
  .wind-diag{padding:2px 5px;font-size:8.5px;}
}
}

<script>
/* ========== TEMA ========== */
(function initTheme(){
  try{
    const saved=localStorage.getItem('sevensurf_theme');
    const prefersLight=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches;
    const theme=saved||(prefersLight?'light':'dark');
    document.documentElement.setAttribute('data-theme',theme);
    // Atualiza o theme-color do meta quando DOM carregar
    window.addEventListener('DOMContentLoaded',()=>{
      const meta=document.querySelector('meta[name="theme-color"]');
      if(meta)meta.setAttribute('content',theme==='light'?'#1E74B8':'#06101F');
      const icon=document.getElementById('themeIcon');
      // Ícone mostra pra onde vai trocar (no dark mostra sol; no light mostra lua)
      if(icon)icon.textContent=theme==='light'?'🌙':'☀️';
    });
  }catch(_){}
})();

function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('sevensurf_theme',next);}catch(_){}
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute('content',next==='light'?'#1E74B8':'#06101F');
  const icon=document.getElementById('themeIcon');
  if(icon)icon.textContent=next==='light'?'🌙':'☀️';
  // Re-render charts com as cores do novo tema
  if(data){render();}
}

function themeColors(){
  const cs=getComputedStyle(document.documentElement);
  return{
    grid:cs.getPropertyValue('--chart-grid').trim()||'rgba(255,255,255,.05)',
    tick:cs.getPropertyValue('--chart-tick').trim()||'rgba(255,255,255,.42)',
    text:cs.getPropertyValue('--text').trim()||'#EAF4F2',
    textDim:cs.getPropertyValue('--text-dim').trim()||'rgba(234,244,242,.62)',
    textMute:cs.getPropertyValue('--text-mute').trim()||'rgba(234,244,242,.38)',
    accent:cs.getPropertyValue('--accent').trim()||'#3DD9B0',
    info:cs.getPropertyValue('--info').trim()||'#5BA9FF',
    warn:cs.getPropertyValue('--warn').trim()||'#FFB547',
    tooltipBg:cs.getPropertyValue('--tooltip-bg').trim()||'#0B1B33',
    isLight:document.documentElement.getAttribute('data-theme')==='light'
  };
}

const SPOTS=[
  {name:"Taíba",lat:-3.0478,lon:-39.5764,type:"Beach break · Kite & Surf"},
  {name:"Leste Oeste",lat:-3.7236,lon:-38.4931,type:"Beach break · Surf"},
  {name:"Iguape",lat:-3.8489,lon:-38.4592,type:"Beach break · Surf"},
  {name:"Titanzinho",lat:-3.7703,lon:-38.4444,type:"Beach break · Surf"},
  {name:"Pecém",lat:-3.5378,lon:-38.9169,type:"Beach break · Surf & Kite"},
];
const DAYS_PT=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MONTHS_PT=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
let curSpot=0,curDay=0,data=null,chart=null,chartMode='default',chartDay=0;

function selectSpot(i){
  curSpot=i;curDay=0;
  document.querySelectorAll('.spot-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  loadData();
}

async function loadData(keepDay=false){
  const appEl=document.getElementById('app');
  if(!keepDay||!data)appEl.innerHTML='<div class="loading"><div class="spinner"></div>Buscando condições...</div>';
  const s=SPOTS[curSpot];
  const cacheKey=`sevsurf_${curSpot}_${new Date().toISOString().slice(0,13)}`; // cache por hora

  // Tenta cache sessionStorage primeiro
  try{
    const cached=sessionStorage.getItem(cacheKey);
    if(cached){
      data=JSON.parse(cached);
      if(!keepDay)curDay=0;
      const upd=new Date();
      const updEl=document.getElementById('lastUpdate');
      if(updEl)updEl.textContent=`Cache ${String(upd.getHours()).padStart(2,'0')}:${String(upd.getMinutes()).padStart(2,'0')}`;
      render();
      return;
    }
  }catch(_){}

  const mu=`https://marine-api.open-meteo.com/v1/marine?latitude=${s.lat}&longitude=${s.lon}&hourly=wave_height,wave_period,wave_direction,sea_level_height_msl&daily=wave_height_max,wave_period_max&timezone=America%2FFortaleza&forecast_days=7`;
  const wu=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&hourly=wind_speed_10m,wind_direction_10m,precipitation&daily=precipitation_sum,wind_speed_10m_max,wind_direction_10m_dominant&timezone=America%2FFortaleza&forecast_days=7`;
  try{
    const [mr,wr]=await Promise.all([fetch(mu),fetch(wu)]);
    const [marine,weather]=await Promise.all([mr.json(),wr.json()]);
    data={marine,weather};
    // Salva no cache
    try{sessionStorage.setItem(cacheKey,JSON.stringify(data));}catch(_){}
    if(!keepDay)curDay=0;
    const upd=new Date();
    const updEl=document.getElementById('lastUpdate');
    if(updEl)updEl.textContent=`Atualizado ${String(upd.getHours()).padStart(2,'0')}:${String(upd.getMinutes()).padStart(2,'0')}`;
    render();
  }catch(e){
    appEl.innerHTML=`<div class="error-msg">Erro ao buscar dados.<br><small>${e.message}</small><br><button onclick="loadData()" style="margin-top:10px;background:var(--accent);border:none;color:#fff;padding:8px 18px;border-radius:99px;cursor:pointer;font-size:13px;font-weight:600;">Tentar novamente</button></div>`;
  }
}

function render(){
  document.getElementById('app').innerHTML=buildHTML();
  // Atualizar data/hora no header
  const _hd=document.getElementById('headerDate');
  if(_hd){
    const _now=new Date();
    const _m=data.marine;
    const _off=curDay*24+(curDay===0?_now.getHours():6);
    const _dd=new Date(_m.hourly.time[curDay*24]);
    const _timeLabel=curDay===0?`agora (${String(_now.getHours()).padStart(2,'0')}h)`:`manhã (06h)`;
    _hd.textContent=`${DAYS_PT[_dd.getDay()]}, ${_dd.getDate()} de ${MONTHS_PT[_dd.getMonth()]} · ${_timeLabel}`;
  }
  renderChart();
  renderWeekChart();
  // scroll hora atual na tabela hora a hora
  setTimeout(()=>{
    const nowRow=document.getElementById('nowRow');
    if(nowRow)nowRow.scrollIntoView({block:'center',behavior:'smooth'});
  },100);
}

function dirToText(d){return["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSO","SO","OSO","O","ONO","NO","NNO"][Math.round(d/22.5)%16];}
function windDesc(ws){
  const v=parseFloat(ws);
  if(v<=5)return{txt:'Calmo',col:'#9FE1CB'};
  if(v<=10)return{txt:'Leve',col:'#5DCAA5'};
  if(v<=18)return{txt:'Moderado',col:'#FAC775'};
  if(v<=25)return{txt:'Forte',col:'#F0A060'};
  return{txt:'Muito forte',col:'#F08080'};
}
function periodDesc(wp){
  const v=parseFloat(wp);
  if(v<6)return{txt:'Ruim',col:'var(--text-mute)'};
  if(v<8)return{txt:'Médio',col:'#9FE1CB'};
  if(v<10)return{txt:'Médio',col:'#5DCAA5'};
  if(v<14)return{txt:'Bom',col:'#FAC775'};
  return{txt:'Épico',col:'#F08080'};
}
function swellDesc(h){
  const v=parseFloat(h);
  if(v<0.5)return{txt:'Flat',col:'var(--text-mute)'};
  if(v<0.8)return{txt:'Fraquinho',col:'var(--text-dim)'};
  if(v<1.2)return{txt:'Pequeno',col:'#9FE1CB'};
  if(v<1.8)return{txt:'Moderado',col:'#5DCAA5'};
  if(v<2.5)return{txt:'Bom',col:'#1D9E75'};
  if(v<3.5)return{txt:'Grande',col:'#FAC775'};
  return{txt:'Muito grande',col:'#F08080'};
}
function weatherIcon(r,w){if(r>5)return'🌧️';if(r>1)return'🌦️';if(w>25)return'💨';return'☀️';}
function scoreSession(wh,wp,ws,windDirDeg,waveDirDeg,hour,tide){
  // Sem pontuação fora da janela surfável (04h–17h)
  if(hour!=null&&(hour>=18||hour<5))return 0;
  let s=0;
  // Altura da onda
  if(wh>=1.5&&wh<=3.5)s+=30;
  else if(wh>=1.2&&wh<1.5)s+=18;
  else if(wh>=1.0&&wh<1.2)s+=10;
  // Período
  if(wp>=14)s+=25;
  else if(wp>=10)s+=18;
  else if(wp>=8)s+=10;
  // Vento
  if(ws<=10)s+=20;
  else if(ws<=18)s+=12;
  else if(ws<=25)s+=4;
  // Bônus offshore
  if(windDirDeg!=null&&waveDirDeg!=null){
    const diff=Math.abs(((windDirDeg-waveDirDeg)+360)%360);
    if(diff>120&&diff<240)s+=15;
    else if(diff>90&&diff<270)s+=6;
  }
  // Maré
  if(tide!=null){
    const t=parseFloat(tide);
    if(t>=2.0)s+=12;
    else if(t>=1.5)s+=10;
    else if(t>=1.0)s+=7;
    else if(t>=0.5)s+=5;
    else s+=2;
  }
  return s;
}
function scoreBadge(sc){
  if(sc>=75)return['🔥 Épico','#1D9E75','#E1F5EE'];
  if(sc>=55)return['⭐ Melhor','#378ADD','#E6F1FB'];
  if(sc>=35)return['👍 Bom','#BA7517','#FAEEDA'];
  return['Normal','#636363','#F1EFE8'];
}
function rating(score){
  if(score>=75)return['Épico 🔥','rating-great'];
  if(score>=55)return['Melhor ⭐','rating-good'];
  if(score>=35)return['Bom 👍','rating-fair'];
  return['Normal','rating-poor'];
}
function moonPhase(date){
  // Calcula fase da lua por algoritmo astronômico simples
  const known=new Date(2000,0,6,18,14,0); // lua nova conhecida
  const synodic=29.53058867;
  const diff=(date-known)/(1000*60*60*24);
  const phase=((diff%synodic)+synodic)%synodic;
  const pct=phase/synodic;
  let emoji,name;
  if(pct<0.033||pct>=0.967){emoji='🌑';name='Lua Nova';}
  else if(pct<0.133){emoji='🌒';name='Crescente';}
  else if(pct<0.233){emoji='🌓';name='Quarto Crescente';}
  else if(pct<0.367){emoji='🌔';name='Gibosa Crescente';}
  else if(pct<0.467){emoji='🌕';name='Lua Cheia';}
  else if(pct<0.567){emoji='🌖';name='Gibosa Minguante';}
  else if(pct<0.700){emoji='🌗';name='Quarto Minguante';}
  else if(pct<0.867){emoji='🌘';name='Minguante';}
  else{emoji='🌑';name='Lua Nova';}
  return{emoji,name,pct};
}
function windQuality(windDir,waveDir){
  // Offshore = vento saindo do mar p/ terra (bom). Onshore = vento vindo do mar (ruim).
  // No Ceará a costa é majoritariamente orientada N-S (leste é o mar).
  // Vento de E/SE/NE = onshore (ruim). Vento de O/SO/NO = offshore (bom).
  const diff=Math.abs(((windDir-waveDir)+360)%360);
  const opp=diff>90&&diff<270;
  if(opp)return{label:'Offshore ↗',cls:'wind-off',desc:'Vento ( terra > mar )',desc2:'onda mais limpa ✓'};
  if(diff<45||diff>315)return{label:'Onshore ↙',cls:'wind-on',desc:'Vento ( mar > terra )',desc2:'bagunça a onda ✗'};
  return{label:'Cross',cls:'wind-cross',desc:'Vento ( cruzado )',desc2:'neutro na onda ~'};
}

function buildBestSessions(){
  const m=data.marine,w=data.weather;
  const sessions=[];
  for(let d=0;d<7;d++){
    const di=d*24,ddate=new Date(m.hourly.time[di]);
    let bestScore=-1,bestH=null;
    // Avalia TODAS as horas do dia — sem janelas fixas
    const _bTidesRaw=Array.from({length:24},(_,h)=>m.hourly.sea_level_height_msl?.[di+h]??null).filter(v=>v!==null);
    const _bTideMin=_bTidesRaw.length?Math.min(..._bTidesRaw):0;
    for(let h=0;h<24;h++){
      const idx=di+h;
      const rawTb=m.hourly.sea_level_height_msl?.[idx]??null;
      const tb=rawTb!==null?rawTb-_bTideMin:null;
      const sc=scoreSession(m.hourly.wave_height[idx]??0,m.hourly.wave_period[idx]??0,w.hourly.wind_speed_10m[idx]??0,w.hourly.wind_direction_10m[idx]??null,m.hourly.wave_direction[idx]??null,h,tb);
      if(sc>bestScore){bestScore=sc;bestH=h;}
    }
    if(bestH!==null){
      const idx=di+bestH;
      const dayTides=Array.from({length:24},(_,h)=>m.hourly.sea_level_height_msl?.[di+h]??null).filter(v=>v!==null);
      const tideMin=dayTides.length?Math.min(...dayTides):0;
      const rawTide=m.hourly.sea_level_height_msl?.[idx]??null;
      const tide=rawTide!==null?(rawTide-tideMin).toFixed(2):null;
      const rain=(w.hourly.precipitation[idx]??0).toFixed(1);
      const windDirDeg=w.hourly.wind_direction_10m[idx]??null;
      const waveDirDeg=m.hourly.wave_direction[idx]??null;
      sessions.push({
        dayIndex:d,
        day:DAYS_PT[ddate.getDay()],
        date:`${ddate.getDate()}/${ddate.getMonth()+1}`,
        hour:bestH,
        waveH:(m.hourly.wave_height[idx]??0).toFixed(1),
        wavePer:(m.hourly.wave_period[idx]??0).toFixed(0),
        windSpd:(w.hourly.wind_speed_10m[idx]??0).toFixed(0),
        windDir:w.hourly.wind_direction_10m[idx]!=null?dirToText(w.hourly.wind_direction_10m[idx]):'--',
        windDiag:(windDirDeg!=null&&waveDirDeg!=null)?windQuality(windDirDeg,waveDirDeg):null,
        tide,rain,score:bestScore,
      });
    }
  }
  sessions.sort((a,b)=>a.dayIndex-b.dayIndex);
  const maxScore=Math.max(...sessions.map(s=>s.score));
  return sessions.map(s=>{
    const isTop=s.score===maxScore;
    const isActive=s.dayIndex===curDay;
    const [lbl,col,bg]=scoreBadge(s.score);
    const icon=lbl.includes('Épico')?'🔥':lbl.includes('Melhor')?'⭐':lbl.includes('Bom')?'👍':'';
    const labelText=lbl.replace(/^[^\s]+\s/,'');
    const diagBadge=s.windDiag
      ? `<span class="wind-diag ${s.windDiag.cls}" title="${s.windDiag.desc} — ${s.windDiag.desc2}">${s.windDiag.label}</span>`
      : `<span style="color:var(--text-faint);font-size:10px;">—</span>`;
    return`<div class="best-row${isTop?' best-top':''}${isActive?' best-active':''}" onclick="selectDay(${s.dayIndex})" style="cursor:pointer;">
      <div style="display:flex;justify-content:flex-start;"><span class="best-badge" style="background:${bg};color:${col}">${icon} ${labelText}</span></div>
      <div><span class="best-day">${s.day}</span></div>
      <div class="best-hour">${String(s.hour).padStart(2,'0')}h – ${String(s.hour+2).padStart(2,'0')}h</div>
      <div class="best-wave">${s.waveH}m</div>
      <div class="best-tide">${s.tide!==null?'+'+s.tide:'<span title="Dados de maré indisponíveis para este spot" style="color:var(--text-faint);cursor:help;">s/dados ⓘ</span>'}</div>
      <div class="best-per">${s.wavePer}s</div>
      <div class="best-wind">${s.windSpd}km/h</div>
      <div>${diagBadge}</div>
      <div></div>
    </div>`;
  }).join('');
}

      const t=rawT!==null?rawT-_tMin:null;
      const sc=scoreSession(m.hourly.wave_height[idx]??0,m.hourly.wave_period[idx]??0,w.hourly.wind_speed_10m[idx]??0,w.hourly.wind_direction_10m[idx]??null,m.hourly.wave_direction[idx]??null,h,t);
      if(sc>bestScore){bestScore=sc;bestH=h;}
    }
    const idx=di+bestH;
    const wh=m.hourly.wave_height[idx]??0;
    const wp=m.hourly.wave_period[idx]??0;
    const ws=w.hourly.wind_speed_10m[idx]??0;
    const windDir=w.hourly.wind_direction_10m[idx]??null;
    const waveDir=m.hourly.wave_direction[idx]??null;
    const rawT=m.hourly.sea_level_height_msl?.[idx]??null;
    const t=rawT!==null?rawT-_tMin:null;

    // Descompor score por critério
    let sWave=0,sPeriod=0,sWind=0,sOffshore=0,sTide=0;
    if(wh>=1.5&&wh<=3.5)sWave=30;
    else if(wh>=1.2&&wh<1.5)sWave=18;
    else if(wh>=1.0&&wh<1.2)sWave=10;
    if(wp>=14)sPeriod=25;
    else if(wp>=10)sPeriod=18;
    else if(wp>=8)sPeriod=10;
    if(ws<=10)sWind=20;
    else if(ws<=18)sWind=12;
    else if(ws<=25)sWind=4;
    if(windDir!=null&&waveDir!=null){
      const diff=Math.abs(((windDir-waveDir)+360)%360);
      if(diff>120&&diff<240)sOffshore=15;
      else if(diff>90&&diff<270)sOffshore=6;
    }
    if(t!=null){
      const tv=parseFloat(t);
      if(tv>=2.0)sTide=12;
      else if(tv>=1.5)sTide=10;
      else if(tv>=1.0)sTide=7;
      else if(tv>=0.5)sTide=5;
      else sTide=2;
    }

    labels.push(DAYS_PT[ddate.getDay()]+'\n'+ddate.getDate()+'/'+String(ddate.getMonth()+1).padStart(2,'0'));
    dWave.push(sWave);
    dPeriod.push(sPeriod);
    dWind.push(sWind);
    dOffshore.push(sOffshore);
    dTide.push(sTide);
    waveVals.push(+wh.toFixed(1));
    bestHours.push(bestH);
  }
  const totals=dWave.map((v,i)=>v+dPeriod[i]+dWind[i]+dOffshore[i]+dTide[i]);

  const weekOverlay={
    id:'weekOverlay',
    afterDatasetsDraw(ch){
      const {ctx,scales:{x,y}}=ch;
      ctx.save();

      // Labels dentro de cada segmento empilhado
      // Ordem de empilhamento (de baixo pra cima): Onda, Período, Vento, Offshore, Maré
      const segments=[
        {label:'Onda',data:dWave},
        {label:'Período',data:dPeriod},
        {label:'Vento',data:dWind},
        {label:'Offshore',data:dOffshore},
        {label:'Maré',data:dTide},
      ];
      ctx.font='600 9px Inter,system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      for(let i=0;i<totals.length;i++){
        const xPos=x.getPixelForValue(i);
        let cumulative=0;
        for(const seg of segments){
          const val=seg.data[i];
          if(val<=0){continue;}
          const yBottom=y.getPixelForValue(cumulative);
          const yTop=y.getPixelForValue(cumulative+val);
          const segHeight=yBottom-yTop;
          // Só desenha se o segmento for alto o suficiente pro texto
          if(segHeight>=14){
            const yMid=(yBottom+yTop)/2;
            const txt=seg.label;
            const tw=ctx.measureText(txt).width;
            // Se a barra for estreita demais, também pula
            const barWidth=x.getPixelForValue(1)-x.getPixelForValue(0);
            if(tw<barWidth*0.75){
              // Contorno escuro pra garantir legibilidade em cima de qualquer cor
              ctx.lineWidth=2.5;
              ctx.strokeStyle=_tc.isLight?'rgba(255,255,255,0.9)':'rgba(10,22,40,0.75)';
              ctx.strokeText(txt,xPos,yMid);
              ctx.fillStyle=_tc.isLight?'rgba(10,40,68,0.9)':'rgba(255,255,255,0.95)';
              ctx.fillText(txt,xPos,yMid);
            }
          }
          cumulative+=val;
        }
      }

      // Pontuação total + hora no topo da barra
      ctx.textAlign='center';
      ctx.textBaseline='bottom';
      for(let i=0;i<totals.length;i++){
        const xPos=x.getPixelForValue(i);
        const yTop=y.getPixelForValue(totals[i]);
        const totalTxt=totals[i]+'pts';
        ctx.font='bold 10px Inter,system-ui,sans-serif';
        const tw=ctx.measureText(totalTxt).width+6;
        ctx.fillStyle=_tc.isLight?'rgba(255,255,255,0.85)':'rgba(10,22,40,0.6)';
        ctx.beginPath();
        ctx.roundRect(xPos-tw/2,yTop-16,tw,13,3);
        ctx.fill();
        const [,col]=scoreBadge(totals[i]);
        ctx.fillStyle=col;
        ctx.fillText(totalTxt,xPos,yTop-5);
        // Melhor horário acima da pontuação
        const hourTxt=String(bestHours[i]).padStart(2,'0')+'h';
        ctx.font='bold 9px Inter,system-ui,sans-serif';
        ctx.fillStyle=_tc.textDim;
        ctx.fillText(hourTxt,xPos,yTop-18);
      }
      ctx.restore();
    }
  };

  const ctx=document.getElementById('weekChart');
  if(!ctx)return;
  if(weekChart)weekChart.destroy();
  weekChart=new Chart(ctx,{
    plugins:[weekOverlay],
    data:{
      labels,
      datasets:[
        {type:'bar',label:'Onda',data:dWave,backgroundColor:'rgba(29,158,117,0.75)',borderColor:'rgba(29,158,117,0.9)',borderWidth:1,borderRadius:{topLeft:0,topRight:0},stack:'score',yAxisID:'y',order:2},
        {type:'bar',label:'Período',data:dPeriod,backgroundColor:'rgba(55,138,221,0.75)',borderColor:'rgba(55,138,221,0.9)',borderWidth:1,stack:'score',yAxisID:'y',order:2},
        {type:'bar',label:'Vento',data:dWind,backgroundColor:'rgba(250,199,117,0.75)',borderColor:'rgba(250,199,117,0.9)',borderWidth:1,stack:'score',yAxisID:'y',order:2},
        {type:'bar',label:'Offshore',data:dOffshore,backgroundColor:'rgba(93,202,165,0.75)',borderColor:'rgba(93,202,165,0.9)',borderWidth:1,stack:'score',yAxisID:'y',order:2},
        {type:'bar',label:'Maré',data:dTide,backgroundColor:'rgba(186,117,23,0.75)',borderColor:'rgba(186,117,23,0.9)',borderWidth:1,borderRadius:{topLeft:3,topRight:3},stack:'score',yAxisID:'y',order:2}
      ]
    },
    options:{
      responsive:true,
      onClick:(e,els)=>{if(els.length)selectDay(els[0].index);},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          display:false
        },
        tooltip:{
          backgroundColor:_tc.tooltipBg,
          borderColor:_tc.isLight?'rgba(10,40,80,.12)':'rgba(255,255,255,0.1)',
          borderWidth:1,
          titleColor:_tc.accent,
          bodyColor:_tc.text,
          callbacks:{
            title:items=>labels[items[0].dataIndex].replace('\n',' '),
            label:c=>{
              if(c.dataset.label==='Onda (m)')return`Onda: ${c.parsed.y.toFixed(1)}m`;
              return`${c.dataset.label}: ${c.parsed.y}pts`;
            },
            footer:items=>{
              const total=items.filter(i=>i.dataset.label!=='Onda (m)').reduce((s,i)=>s+i.parsed.y,0);
              const [badge]=scoreBadge(total);
              return`Total: ${badge} (${total}pts)`;
            }
          }
        }
      },
      scales:{
        x:{grid:{color:_tc.grid},ticks:{color:_tc.tick,font:{size:10}}},
        y:{position:'left',stacked:true,grid:{color:_tc.grid},ticks:{color:_tc.textMute,font:{size:9}},beginAtZero:true,title:{display:true,text:'Score',color:_tc.textMute,font:{size:9}}}
      }
    }
  });
}

function renderChart(targetCanvasId){
  const _tc=themeColors();
  const isFullscreen=!!targetCanvasId;
  if(!isFullscreen)chartDay=Math.max(0,Math.min(6,chartDay)); // aceita todos os 7 dias
  if(!isFullscreen)updateChartDayLabel();
  const m=data.marine,w=data.weather,off=chartDay*24;
  const now=new Date();
  const curHour=now.getHours();
  const labels=[],waveVals=[],windVals=[],rainVals=[],tideVals=[],scores=[],chartHours=[];
  // Calcular tideMin do dia para normalização antes do loop
  const _chartTidesRaw=Array.from({length:24},(_,h)=>m.hourly.sea_level_height_msl?.[off+h]??null).filter(v=>v!==null);
  const _chartTideMin=_chartTidesRaw.length?Math.min(..._chartTidesRaw):0;
  // Exibe apenas a janela surfável: 05h–17h
  for(let h=5;h<18;h++){
    const t=new Date(m.hourly.time[off+h]);
    chartHours.push(h);
    labels.push(String(t.getHours()).padStart(2,'0')+'h');
    waveVals.push(+(m.hourly.wave_height[off+h]??0).toFixed(2));
    windVals.push(+(w.hourly.wind_speed_10m[off+h]??0).toFixed(1));
    rainVals.push(+(w.hourly.precipitation[off+h]??0).toFixed(2));
    tideVals.push(m.hourly.sea_level_height_msl?.[off+h]??null);
    const rawTc=m.hourly.sea_level_height_msl?.[off+h]??null;
    const tc=rawTc!==null?rawTc-_chartTideMin:null;
    scores.push(scoreSession(
      m.hourly.wave_height[off+h]??0,
      m.hourly.wave_period[off+h]??0,
      w.hourly.wind_speed_10m[off+h]??0,
      w.hourly.wind_direction_10m[off+h]??null,
      m.hourly.wave_direction[off+h]??null,
      h,
      tc
    ));
  }
  const tideFilt=tideVals.filter(v=>v!==null);
  const tideMin=tideFilt.length?Math.min(...tideFilt):0;
  const tideNorm=tideVals.map(v=>v!==null?+(v-tideMin).toFixed(2):null);

  // Cor de cada barra de maré baseada no score da hora
  const maxScore=Math.max(...scores);
  const tideColors=scores.map(sc=>{
    const ratio=maxScore>0?sc/maxScore:0;
    if(ratio>=0.8)return'rgba(200,50,50,0.55)';    // vermelho — épico
    if(ratio>=0.6)return'rgba(220,120,30,0.55)';   // laranja — ótimo
    if(ratio>=0.4)return'rgba(220,190,30,0.50)';   // amarelo — bom
    return'rgba(100,100,120,0.3)';                  // cinza — fraco
  });
  const tideBorders=scores.map(sc=>{
    const ratio=maxScore>0?sc/maxScore:0;
    if(ratio>=0.8)return'rgba(200,50,50,0.85)';
    if(ratio>=0.6)return'rgba(220,120,30,0.85)';
    if(ratio>=0.4)return'rgba(220,190,30,0.80)';
    return'rgba(100,100,120,0.4)';
  });

  const primaryVals=chartMode==='rain'?rainVals:waveVals;
  const bestIdx=scores.length?scores.indexOf(Math.max(...scores)):-1;
  const bestHour=bestIdx>=0?bestIdx:-1; // índice no array filtrado (para getPixelForValue)
  // Segundo melhor: maior score excluindo o bestIdx e horas adjacentes (±1h)
  const secondIdx=scores.reduce((best,sc,i)=>{
    if(Math.abs(i-bestIdx)<=1)return best;
    return(best===-1||sc>scores[best])?i:best;
  },-1);
  const secondHour=secondIdx>=0?secondIdx:-1;

  const primaryColor=chartMode==='rain'?'#85B7EB':'#5DCAA5';
  const primaryFill=chartMode==='rain'?'rgba(133,183,235,0.12)':'rgba(93,202,165,0.12)';
  const primaryLabel=chartMode==='rain'?'Chuva (mm)':'Ondas (m)';

  const overlayPlugin={
    id:'overlayPlugin',
    afterDatasetsDraw(ch){
      const {ctx,scales:{x,y,y3}}=ch;
      ctx.save();

      const labelX=ch.chartArea.left+10;

      // Valores da altura da onda na própria linha (a cada 2 índices do array filtrado)
      if(chartMode!=='rain'){
        ctx.font='bold 10px system-ui';
        ctx.textAlign='center';
        ctx.textBaseline='bottom';
        for(let i=0;i<waveVals.length;i+=2){
          const xPos=x.getPixelForValue(i);
          const yPos=y.getPixelForValue(waveVals[i]);
          const val=waveVals[i].toFixed(1);
          // fundo escuro para legibilidade
          const tw=ctx.measureText(val+'m').width+6;
          ctx.fillStyle=_tc.isLight?'rgba(255,255,255,0.85)':'rgba(10,22,40,0.55)';
          ctx.beginPath();
          ctx.roundRect(xPos-tw/2, yPos-18, tw, 13, 3);
          ctx.fill();
          ctx.fillStyle=_tc.accent;
          ctx.fillText(val+'m', xPos, yPos-7);
        }
      }

      // Textura de chuva sobre a linha de vento nas horas com precipitação
      for(let i=0;i<rainVals.length;i++){
        if(rainVals[i]<=0)continue;
        const xPos=x.getPixelForValue(i);
        const yWind=y3.getPixelForValue(windVals[i]);
        const intensity=Math.min(rainVals[i]/2,1); // 0–1 baseado em mm
        const alpha=0.25+intensity*0.45;
        const numDrops=3+Math.round(intensity*4);
        const spread=x.getPixelForValue(1)-x.getPixelForValue(0); // largura de 1 intervalo
        ctx.strokeStyle=`rgba(133,183,235,${alpha})`;
        ctx.lineWidth=1;
        ctx.setLineDash([]);
        for(let d=0;d<numDrops;d++){
          const dx=xPos-spread*0.4+(d/(numDrops-1||1))*spread*0.8;
          const dy=yWind-8-((d*7+i*13)%15);
          ctx.beginPath();
          ctx.moveTo(dx-1,dy);
          ctx.lineTo(dx+1,dy+7);
          ctx.stroke();
        }
      }


      if(bestHour<0){ctx.restore();return;}
      const xBest=x.getPixelForValue(bestHour);
      const yBase=ch.chartArea.bottom;
      const yTop=ch.chartArea.top;
      // linha vertical tracejada dourada
      ctx.strokeStyle='rgba(250,199,117,0.35)';
      ctx.lineWidth=1;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.moveTo(xBest,yTop);
      ctx.lineTo(xBest,yBase);
      ctx.stroke();
      ctx.setLineDash([]);
      // estrela no topo
      const bestRealHour=chartHours[bestHour]??bestHour+5;
      ctx.font='bold 16px system-ui';
      ctx.textAlign='center';
      ctx.textBaseline='top';
      ctx.fillStyle='#FAC775';
      ctx.fillText('★',xBest,yTop+2);
      // hora abaixo da estrela
      ctx.font='bold 9px system-ui';
      ctx.textBaseline='top';
      ctx.fillStyle='rgba(250,199,117,0.8)';
      ctx.fillText(String(bestRealHour).padStart(2,'0')+'h',xBest,yTop+20);
      // Segundo melhor momento — estrela prateada
      if(secondHour>=0){
        const xSecond=x.getPixelForValue(secondHour);
        ctx.strokeStyle='rgba(180,180,200,0.3)';
        ctx.lineWidth=1;
        ctx.setLineDash([3,3]);
        ctx.beginPath();
        ctx.moveTo(xSecond,yTop);
        ctx.lineTo(xSecond,yBase);
        ctx.stroke();
        ctx.setLineDash([]);
        const secondRealHour=chartHours[secondHour]??secondHour+5;
        ctx.font='bold 16px system-ui';
        ctx.textAlign='center';
        ctx.textBaseline='top';
        ctx.fillStyle='#B0B0C8';
        ctx.fillText('★',xSecond,yTop+2);
        ctx.font='bold 9px system-ui';
        ctx.textBaseline='top';
        ctx.fillStyle='rgba(180,180,200,0.75)';
        ctx.fillText(String(secondRealHour).padStart(2,'0')+'h',xSecond,yTop+20);
      }
      // linha vertical agora desenhada por último (à frente)
      if(chartDay===0){
        const nowIdx=chartHours.indexOf(curHour);
        if(nowIdx>=0){
          const xNow=x.getPixelForValue(nowIdx);
          ctx.strokeStyle='rgba(220,50,50,0.85)';
          ctx.lineWidth=2;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(xNow,ch.chartArea.top);
          ctx.lineTo(xNow,ch.chartArea.bottom);
          ctx.stroke();
          ctx.font='bold 10px system-ui';
          ctx.textAlign='center';
          ctx.fillStyle='rgba(220,50,50,0.9)';
          ctx.fillText('agora',xNow,ch.chartArea.top+8);
        }
      }
      ctx.restore();
    }
  };

  const ctx=document.getElementById(targetCanvasId||'mainChart');
  if(!ctx)return;
  if(isFullscreen){
    if(window.chartFull)window.chartFull.destroy();
  } else {
    if(chart)chart.destroy();
  }

  const _newChart=new Chart(ctx,{
    plugins:[overlayPlugin],
    data:{
      labels,
      datasets:[
        // Dataset principal: ondas (linha) ou chuva (barras)
        {
          type:chartMode==='rain'?'bar':'line',
          label:primaryLabel,
          data:primaryVals,
          borderColor:primaryColor,
          backgroundColor:chartMode==='rain'?primaryColor:primaryFill,
          borderWidth:2,tension:0.4,
          fill:chartMode!=='rain',
          pointRadius:0,pointHoverRadius:5,
          pointHoverBackgroundColor:primaryColor,
          yAxisID:'y',order:2
        },
        // Vento — linha tracejada amarela, sempre visível
        {
          type:'line',
          label:'Vento (km/h)',
          data:windVals,
          borderColor:'rgba(250,199,117,0.85)',
          backgroundColor:'transparent',
          borderWidth:1.5,
          borderDash:[4,3],
          tension:0,
          stepped:'before',
          fill:false,
          pointRadius:0,pointHoverRadius:4,
          pointHoverBackgroundColor:'#FAC775',
          yAxisID:'y3',order:1
        },
        // Maré — barras coloridas por score
        {
          type:'bar',
          label:'Maré (m)',
          data:tideNorm,
          backgroundColor:tideColors,
          borderColor:tideBorders,
          borderWidth:1,borderRadius:2,
          yAxisID:'y2',order:3
        },
        // Chuva — linha em degraus azul claro, sempre visível
        {
          type:'line',
          label:'Chuva (mm)',
          data:rainVals,
          borderColor:'rgba(133,183,235,0.9)',
          backgroundColor:'rgba(133,183,235,0.08)',
          borderWidth:2,
          stepped:'before',
          fill:true,
          pointRadius:0,pointHoverRadius:4,
          pointHoverBackgroundColor:'#85B7EB',
          yAxisID:'y4',order:0
        }
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          display:false
        },
        tooltip:{
          backgroundColor:_tc.tooltipBg,
          borderColor:_tc.isLight?'rgba(10,40,80,.12)':'rgba(255,255,255,0.1)',
          borderWidth:1,
          titleColor:_tc.accent,
          bodyColor:_tc.text,
          callbacks:{
            label:c=>{
              if(c.dataset.label==='Maré (m)')return`Maré: +${c.parsed.y.toFixed(2)}m`;
              if(c.dataset.label==='Vento (km/h)')return`Vento: ${c.parsed.y.toFixed(1)}km/h`;
              if(c.dataset.label==='Chuva (mm)')return`Chuva: ${c.parsed.y.toFixed(2)}mm`;
              return`Ondas: ${c.parsed.y.toFixed(2)}m`;
            },
            afterBody:(items)=>{
              const h=items[0].dataIndex;
              const sc=scores[h];
              const [badge]=scoreBadge(sc);
              return[`Score: ${badge} (${sc}pts)`];
            }
          }
        }
      },
      scales:{
        x:{
          grid:{color:_tc.grid},
          ticks:{color:_tc.tick,font:{size:10},maxTicksLimit:13}
        },
        y:{
          position:'left',
          grid:{color:_tc.grid},
          ticks:{display:false},
          beginAtZero:true,
          max:Math.ceil(Math.max(...waveVals)*1.3*10)/10,
          title:{display:false}
        },
        y2:{
          position:'right',
          grid:{drawOnChartArea:false},
          ticks:{display:false},
          beginAtZero:true,
          max:Math.ceil(Math.max(...tideNorm.filter(v=>v!==null))*1.3*10)/10,
          title:{display:false}
        },
        y3:{
          position:'right',
          grid:{drawOnChartArea:false},
          ticks:{display:false},
          beginAtZero:true,
          max:Math.ceil(Math.max(...windVals)*1.3*10)/10,
          title:{display:false},
          offset:true
        },
        y4:{
          position:'left',
          grid:{drawOnChartArea:false},
          ticks:{display:false},
          beginAtZero:true,
          title:{display:false},
          display:false
        }
      }
    }
  });
  if(isFullscreen){window.chartFull=_newChart;} else {chart=_newChart;}
}

function openChartFullscreen(){
  if(!data)return;
  const modal=document.getElementById('chartModal');
  const title=document.getElementById('chartModalTitle');
  if(title){
    const s=SPOTS[curSpot];
    const m=data.marine;
    const dd=new Date(m.hourly.time[chartDay*24]);
    const isToday=chartDay===0;
    const label=isToday?'Hoje':`${DAYS_PT[dd.getDay()]}, ${dd.getDate()}/${dd.getMonth()+1}`;
    title.textContent=`${s.name} — ${label}`;
  }
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  // Renderiza no canvas full depois do modal aparecer (pra ter dimensões corretas)
  setTimeout(()=>renderChart('mainChartFull'),50);
}

function closeChartFullscreen(ev){
  if(ev&&ev.target&&ev.target.id!=='chartModal'&&ev.type==='click'&&!ev.target.closest('[onclick*="closeChartFullscreen"]'))return;
  const modal=document.getElementById('chartModal');
  modal.classList.remove('open');
  document.body.style.overflow='';
  if(window.chartFull){window.chartFull.destroy();window.chartFull=null;}
}

// ESC fecha
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const modal=document.getElementById('chartModal');
    if(modal&&modal.classList.contains('open'))closeChartFullscreen();
  }
});

function openRoute(){
  const s=SPOTS[curSpot];
  if(!s)return;
  // Google Maps Directions: usa "Minha Localização" como origem (dir_action=navigate pede navegação)
  // e as coordenadas do pico como destino. Inclui o nome como query pra melhorar o display.
  const dest=`${s.lat},${s.lon}`;
  const url=`https://www.google.com/maps/dir/?api=1&destination=${dest}&destination_place_id=&travelmode=driving&dir_action=navigate`;
  window.open(url,'_blank','noopener');
}

async function shareSnapshot(){
  const btn=document.getElementById('shareBtn');
  if(!btn||btn.disabled)return;
  if(typeof html2canvas==='undefined'){
    alert('Biblioteca de captura ainda carregando. Tente de novo em 1s.');
    return;
  }
  const originalHTML=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML='<span style="font-size:11px;">…</span>';
  try{
    const s=SPOTS[curSpot];
    // Capturar só o conteúdo relevante: header + spot-bar + main
    // Usamos document.body mas com algumas opções pra evitar cortar
    const bodyBg=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim()||'#06101F';
    const canvas=await html2canvas(document.body,{
      backgroundColor:bodyBg,
      scale:2,
      useCORS:true,
      logging:false,
      windowWidth:document.documentElement.scrollWidth,
      windowHeight:document.documentElement.scrollHeight,
      ignoreElements:(el)=>el.id==='shareBtn'||el.closest?.('#shareBtn')
    });
    const blob=await new Promise(res=>canvas.toBlob(res,'image/png',0.95));
    if(!blob)throw new Error('Falha ao gerar imagem');

    const today=new Date();
    const dateStr=`${String(today.getDate()).padStart(2,'0')}-${String(today.getMonth()+1).padStart(2,'0')}`;
    const filename=`surfseven-${s.name.toLowerCase().replace(/\s+/g,'')}-${dateStr}.png`;
    const shareText=`🏄 Previsão ${s.name} — ${today.getDate()}/${today.getMonth()+1}\nSurfSeven · Litoral Ceará`;

    const file=new File([blob],filename,{type:'image/png'});

    // Tenta Web Share API com arquivo (mobile)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file],title:'SurfSeven',text:shareText});
        return;
      }catch(err){
        // Cancelamento pelo usuário ou falha — cai no fallback
        if(err.name==='AbortError')return;
      }
    }

    // Fallback desktop: oferece opções (WhatsApp Web com texto + download da imagem)
    showShareFallback(blob,filename,shareText);

  }catch(e){
    console.error(e);
    alert('Erro ao gerar imagem: '+e.message);
  }finally{
    btn.disabled=false;
    btn.innerHTML=originalHTML;
  }
}

function showShareFallback(blob,filename,shareText){
  const url=URL.createObjectURL(blob);
  // Dispara download
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  // Abre WhatsApp Web com o texto (a imagem baixada o usuário anexa manualmente)
  const waUrl=`https://web.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;
  setTimeout(()=>{
    if(confirm('Imagem salva! Abrir WhatsApp Web para enviar? (anexe a imagem que foi baixada)')){
      window.open(waUrl,'_blank','noopener');
    }
  },400);
}

function forceRefresh(){
  try{
    const prefix=`sevsurf_${curSpot}_`;
    Object.keys(sessionStorage).filter(k=>k.startsWith(prefix)).forEach(k=>sessionStorage.removeItem(k));
  }catch(_){}
  loadData();
}

loadData();
</script>
